# ╔══════════════════════════════════════════════════════════════╗
# ║          VibeVault — Android CI Build Workflow               ║
# ╚══════════════════════════════════════════════════════════════╝

name: Android CI — Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Stop any existing Gradle daemons
        run: ./gradlew --stop || true

      - name: Delete local .gradle lock files
        run: rm -rf ~/.gradle/caches/*/gc.properties ~/.gradle/caches/journal-* || true

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
