# ╔══════════════════════════════════════════════════════════════╗
# ║          VibeVault — Android CI Build Workflow               ║
# ╚══════════════════════════════════════════════════════════════╝

name: Android CI — Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew clean assembleDebug --stacktrace 2>&1 | tee build-full.log

      - name: Show build log — WHAT WENT WRONG section
        if: failure()
        run: |
          echo "============================================================"
          echo "WHAT WENT WRONG:"
          echo "============================================================"
          grep -A 30 "FAILURE\|What went wrong" build-full.log || echo "(no error section found)"

      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-full-log
          path: build-full.log
          retention-days: 7

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VibeVault-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
