# ╔══════════════════════════════════════════════════════════════╗
# ║          VibeVault — Android CI Build Workflow               ║
# ╚══════════════════════════════════════════════════════════════╝

name: Android CI — Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        id: build
        continue-on-error: true
        run: ./gradlew assembleDebug --no-daemon 2>&1 | tee build-full.log; exit ${PIPESTATUS[0]}

      - name: Show build log — TOP 150 LINES (real error is here)
        if: always()
        run: |
          echo "============================================================"
          echo "TOP 150 LINES — actual error should be visible here:"
          echo "============================================================"
          head -150 build-full.log || echo "(no log file found)"

      - name: Show build log — WHAT WENT WRONG section
        if: always()
        run: |
          echo "============================================================"
          echo "WHAT WENT WRONG:"
          echo "============================================================"
          awk '/\* What went wrong:/,/\* Try:/' build-full.log || echo "(no 'What went wrong' section found)"

      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-full-log
          path: build-full.log
          retention-days: 7

      - name: Upload APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
