# ╔══════════════════════════════════════════════════════════════╗
# ║          VibeVault — Android CI Build Workflow               ║
# ╚══════════════════════════════════════════════════════════════╝

name: Android CI — Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 (required for AGP 8.x) ──
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Make gradlew executable ──
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 4. Cache Gradle ──
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. Build debug APK ──
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── 6. Find and rename APK ──
      - name: Rename APK
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          APK_NAME="VibeVault-debug-build${BUILD_NUMBER}.apk"
          echo "Searching for APK files..."
          find app/build/outputs -name "*.apk" -type f
          APK_PATH=$(find app/build/outputs -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found in build outputs!"
            ls -la app/build/outputs/ || echo "outputs dir not found"
            ls -la app/build/outputs/apk/ || echo "apk dir not found"
            ls -la app/build/outputs/apk/debug/ || echo "debug dir not found"
            exit 1
          fi
          echo "Found APK: $APK_PATH"
          APK_DIR=$(dirname "$APK_PATH")
          mv "$APK_PATH" "${APK_DIR}/${APK_NAME}"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          echo "APK_DIR=$APK_DIR" >> $GITHUB_ENV

      # ── 7. Upload APK artifact ──
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_DIR }}/${{ env.APK_NAME }}
          retention-days: 30

      # ── 8. Build summary ──
      - name: Build summary
        run: |
          echo "### ✅ Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| APK | \`${{ env.APK_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build # | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(du -sh "${{ env.APK_DIR }}/${{ env.APK_NAME }}" | cut -f1)
          echo "| Size | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
