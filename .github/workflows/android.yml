# ╔══════════════════════════════════════════════════════════════╗
# ║          VibeVault — Android CI Build Workflow               ║
# ╚══════════════════════════════════════════════════════════════╝

name: Android CI — Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        id: build
        continue-on-error: true
        run: ./gradlew assembleDebug --stacktrace > build-output.txt 2>&1

      - name: Report build result
        run: |
          if [ "${{ steps.build.outcome }}" = "failure" ]; then
            echo "### ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -200 build-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat build-output.txt
            exit 1
          else
            echo "### ✅ Build Succeeded" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Rename APK
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          APK_NAME="VibeVault-debug-build${BUILD_NUMBER}.apk"
          APK_PATH=$(find app/build/outputs -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found!"
            exit 1
          fi
          APK_DIR=$(dirname "$APK_PATH")
          mv "$APK_PATH" "${APK_DIR}/${APK_NAME}"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          echo "APK_DIR=$APK_DIR" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_DIR }}/${{ env.APK_NAME }}
          retention-days: 30

      - name: Build summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| APK | \`${{ env.APK_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build # | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(du -sh "${{ env.APK_DIR }}/${{ env.APK_NAME }}" | cut -f1)
          echo "| Size | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
