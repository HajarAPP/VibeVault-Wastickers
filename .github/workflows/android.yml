name: Android CI — Build & Sign Release AAB

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Sign AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/vibevault-release.jks

      - name: Verify keystore decoded
        run: |
          ls -lh ${{ github.workspace }}/vibevault-release.jks
          echo "Keystore size: $(stat -c%s ${{ github.workspace }}/vibevault-release.jks) bytes"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build signed Release AAB
        env:
          KEYSTORE_FILE:     ${{ github.workspace }}/vibevault-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          set -o pipefail
          ./gradlew clean bundleRelease --stacktrace --info 2>&1 | tee build.log
          echo "Gradle exit code: $?"

      - name: List ALL build outputs (always runs)
        if: always()
        run: |
          echo "=== app/build/outputs/ ==="
          ls -R app/build/outputs/ 2>/dev/null || echo "app/build/outputs/ does not exist!"
          echo ""
          echo "=== find . -name *.aab ==="
          find . -name "*.aab" 2>/dev/null || echo "No .aab files found anywhere!"
          echo ""
          echo "=== find . -name *.apk ==="
          find . -name "*.apk" 2>/dev/null || echo "No .apk files found anywhere!"

      - name: Upload Release AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VibeVault-Release-AAB
          path: "**/*.aab"
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore
          retention-days: 7
